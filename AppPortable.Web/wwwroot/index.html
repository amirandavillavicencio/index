<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AppPortable Web - Base de Migración</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; max-width: 960px; }
    fieldset { margin-bottom: 1.5rem; }
    input, button { padding: 0.5rem; margin-right: 0.5rem; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; overflow-x: auto; }
    .result { border: 1px solid #ddd; padding: 0.75rem; border-radius: 6px; margin-bottom: 0.75rem; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>AppPortable Web (etapa 1 de migración)</h1>
  <p class="muted">Flujo mínimo: subir PDF → procesar → buscar.</p>

  <fieldset>
    <legend>1) Subir y procesar PDF</legend>
    <input type="file" id="pdfFile" accept="application/pdf" />
    <button id="processBtn">Procesar</button>
    <div id="processStatus" class="muted"></div>
    <pre id="processOutput"></pre>
  </fieldset>

  <fieldset>
    <legend>2) Buscar</legend>
    <input type="text" id="query" placeholder="Buscar término" size="40" />
    <button id="searchBtn">Buscar</button>
    <div id="searchStatus" class="muted"></div>
    <div id="searchResults"></div>
  </fieldset>

  <script>
    const processBtn = document.getElementById('processBtn');
    const searchBtn = document.getElementById('searchBtn');
    const pdfFile = document.getElementById('pdfFile');
    const processStatus = document.getElementById('processStatus');
    const processOutput = document.getElementById('processOutput');
    const queryInput = document.getElementById('query');
    const searchStatus = document.getElementById('searchStatus');
    const searchResults = document.getElementById('searchResults');

    processBtn.addEventListener('click', async () => {
      processStatus.textContent = '';
      processOutput.textContent = '';

      if (!pdfFile.files || pdfFile.files.length === 0) {
        processStatus.textContent = 'Selecciona un PDF primero.';
        return;
      }

      const form = new FormData();
      form.append('file', pdfFile.files[0]);

      processStatus.textContent = 'Procesando documento...';

      try {
        const response = await fetch('/api/documents', {
          method: 'POST',
          body: form
        });

        const data = await response.json();

        if (!response.ok) {
          processStatus.textContent = `Error: ${data.error ?? 'No se pudo procesar.'}`;
          return;
        }

        processStatus.textContent = 'Documento procesado e indexado.';
        processOutput.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        processStatus.textContent = `Error de red: ${error}`;
      }
    });

    searchBtn.addEventListener('click', async () => {
      searchResults.innerHTML = '';
      searchStatus.textContent = '';
      const query = queryInput.value.trim();

      if (!query) {
        searchStatus.textContent = 'Escribe una consulta.';
        return;
      }

      searchStatus.textContent = `Buscando "${query}"...`;

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, limit: 20 })
        });

        const data = await response.json();

        if (!response.ok) {
          searchStatus.textContent = `Error: ${data.error ?? 'No se pudo buscar.'}`;
          return;
        }

        if (!data.results || data.results.length === 0) {
          searchStatus.textContent = 'Sin resultados.';
          return;
        }

        searchStatus.textContent = `${data.results.length} resultado(s).`;

        data.results.forEach(item => {
          const box = document.createElement('div');
          box.className = 'result';
          box.innerHTML = `
            <strong>Documento:</strong> ${item.sourceFile}<br/>
            <strong>Página:</strong> ${item.pageStart} - ${item.pageEnd}<br/>
            <strong>Score:</strong> ${item.score}<br/>
            <strong>Snippet:</strong><br/>${item.snippet}
          `;
          searchResults.appendChild(box);
        });
      } catch (error) {
        searchStatus.textContent = `Error de red: ${error}`;
      }
    });
  </script>
</body>
</html>
