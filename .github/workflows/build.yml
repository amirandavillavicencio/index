name: build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AppPortable.sln

      - name: Build
        run: dotnet build AppPortable.sln -c Release --no-restore

      - name: Test
        run: dotnet test AppPortable.sln -c Release --no-build --verbosity normal
