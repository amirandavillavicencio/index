name: build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Validate solution has no AppPortable.Web
        shell: pwsh
        run: |
          if (Select-String -Path AppPortable.sln -Pattern "AppPortable.Web") {
            throw "Stale AppPortable.Web reference found in AppPortable.sln"
          }

      - name: Restore Solution
        run: dotnet restore AppPortable.sln

      - name: Build Desktop
        run: dotnet build AppPortable.Desktop/AppPortable.Desktop.csproj -c Release --no-restore

      - name: Build Tests
        run: dotnet build AppPortable.Tests/AppPortable.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test AppPortable.Tests/AppPortable.Tests.csproj -c Release --no-build

      - name: Publish Desktop EXE
        run: dotnet publish AppPortable.Desktop/AppPortable.Desktop.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppPortable-win-x64
          path: publish/**
